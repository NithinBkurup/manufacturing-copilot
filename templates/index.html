<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Manufacturing Copilot</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Barlow+Condensed:wght@300;400;500;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="static/css/index.css">
</head>
<body>

<!-- HEADER -->
<div class="header">
  <div class="header-logo">
    <div class="header-logo-dot"></div>
    MANUFACTURING COPILOT
  </div>
  <div class="header-spacer"></div>
  <div class="status-group">
    <div class="status-item">
      <div class="status-dot" id="ollama-dot"></div>
      <span id="ollama-label">Connecting...</span>
    </div>
    <div class="status-item">
          <div class="status-dot" id="sql-dot"></div>
          <span id="sql-label">Connecting...</span>
    </div>
      <div class="status-item">
          <div class="status-dot" id="knowledgebase-dot"></div>
          <span id="knowledgebase-label">Connecting...</span>
      </div>
    <div class="status-item">
      <div class="status-dot offline" id="opc-dot"></div>
      <span id="opc-label">OPC Offline</span>
    </div>
    <a href="/admin" class="header-admin">⬡ Admin</a>
  </div>
</div>

<!-- LAYOUT -->
<div class="layout">

  <!-- SIDEBAR -->
  <div class="sidebar">
    <div class="sidebar-section">
    <div class="sidebar-section">
      <div class="sidebar-label">Shift KPIs</div>
      <div class="kpi-grid">
        <div class="kpi-box"><div class="kpi-label">Lines Running</div><div class="kpi-value green" id="kpi-running">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Lines Idle</div><div class="kpi-value amber" id="kpi-idle">—</div></div>
        <div class="kpi-box"><div class="kpi-label">Faults</div><div class="kpi-value red" id="kpi-fault">—</div></div>
        <div class="kpi-box"><div class="kpi-label">OPC Tags</div><div class="kpi-value cyan" id="kpi-tags">—</div></div>
      </div>
    </div>

    <div class="sidebar-label" style="padding: 10px 14px 4px;">Quick Queries</div>
    <div class="quick-list">
      <button class="quick-btn" onclick="sendQuick('What is the current status of all production lines?')">Line status overview</button>
      <button class="quick-btn" onclick="sendQuick('How many units have been produced this shift?')">Shift production count</button>
      <button class="quick-btn" onclick="sendQuick('Show me the status of order 147190737')">Order status</button>
      <button class="quick-btn" onclick="sendQuick('Show torque results for order 147190737')">Torque traceability</button>
      <button class="quick-btn" onclick="sendQuick('What parts were scanned on order 147190737?')">QR scan log</button>
      <button class="quick-btn" onclick="sendQuick('Are there any deviations on order 147190737?')">Deviation check</button>
      <button class="quick-btn" onclick="sendQuick('Was there a bypass on order 147190737?')">Bypass audit</button>
      <button class="quick-btn" onclick="sendQuick('What is the SOP for torque tightening?')">SOP lookup</button>
    </div>
  </div>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="chat-messages" id="chat-messages">
      <div class="welcome-screen" id="welcome-screen">
        <div class="welcome-title">⬡ MANUFACTURING COPILOT</div>
      </div>
    </div>

    <div class="input-bar">
      <div class="input-row">
        <textarea class="chat-input" id="chat-input" rows="1"
          placeholder="Ask about orders, quality, torque, production counts, SOPs..."
          onkeydown="handleKey(event)" oninput="autoResize(this)"></textarea>
        <button class="send-btn" id="send-btn" onclick="sendMessage()">SEND</button>
      </div>
    </div>
  </div>

</div><!-- end layout -->

<script>
const API_BASE = window.location.origin;
let conversationHistory = [];
let isStreaming = false;

function autoResize(el) {
  el.style.height = 'auto';
  el.style.height = Math.min(el.scrollHeight, 160) + 'px';
}

function handleKey(e) {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
}

function sendQuick(text) {
  document.getElementById('chat-input').value = text;
  sendMessage();
}

function renderMessage(role, content) {
  const welcome = document.getElementById('welcome-screen');
  if (welcome) welcome.remove();
  const container = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = `msg ${role}`;
  const now = new Date().toLocaleTimeString('en-GB', { hour12: false });
  const roleLabel = role === 'user' ? 'OPR' : 'MFG AI';
  wrap.innerHTML = `
    <div class="msg-avatar">${roleLabel}</div>
    <div class="msg-body">
      <div class="msg-meta">
        <span class="msg-role">${role === 'user' ? 'Operator' : 'Copilot'}</span>
        <span>${now}</span>
      </div>
      <div class="msg-bubble">${formatContent(content)}</div>
    </div>`;
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
  return wrap.querySelector('.msg-bubble');
}

function formatContent(text) {
  return text
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')
    .replace(/```([\s\S]*?)```/g,'<pre><code>$1</code></pre>')
    .replace(/`([^`]+)`/g,'<code>$1</code>')
    .replace(/\*\*([^*]+)\*\*/g,'<strong>$1</strong>')
    .replace(/\n/g,'<br/>');
}

function showTyping() {
  const welcome = document.getElementById('welcome-screen');
  if (welcome) welcome.remove();
  const container = document.getElementById('chat-messages');
  const wrap = document.createElement('div');
  wrap.className = 'msg assistant'; wrap.id = 'typing-indicator';
  wrap.innerHTML = `<div class="msg-avatar">MFG AI</div><div class="msg-body"><div class="msg-bubble"><div class="typing-indicator"><div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div></div></div></div>`;
  container.appendChild(wrap);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById('typing-indicator');
  if (el) el.remove();
}

async function sendMessage() {
  const input = document.getElementById('chat-input');
  const text = input.value.trim();
  if (!text || isStreaming) return;
  input.value = ''; input.style.height = 'auto';
  isStreaming = true;
  document.getElementById('send-btn').disabled = true;
  renderMessage('user', text);
  conversationHistory.push({ role: 'user', content: text });
  showTyping();
  try {
    const body = { message: text, history: conversationHistory.slice(-10) };
    const resp = await fetch(`${API_BASE}/api/chat/stream`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body),
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    removeTyping();
    const bubble = renderMessage('assistant', '');
    let fullText = '';
    const reader = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buffer += decoder.decode(value, { stream: true });
      const lines = buffer.split('\n'); buffer = lines.pop();
      for (const line of lines) {
        if (!line.startsWith('data: ')) continue;
        try {
          const data = JSON.parse(line.slice(6));
          if (data.token) {
            fullText += data.token;
            bubble.innerHTML = formatContent(fullText) + '<span class="cursor">▌</span>';
            document.getElementById('chat-messages').scrollTop = document.getElementById('chat-messages').scrollHeight;
          }
          if (data.done) {
            let html = formatContent(fullText);
            if (data.data_sources && data.data_sources.length) {
              html += `<div class="data-sources">${data.data_sources.map(s=>`<span class="src-badge">${s}</span>`).join('')}</div>`;
            }
            bubble.innerHTML = html;
          }
          if (data.error) bubble.innerHTML = `<span style="color:var(--red)">Error: ${data.error}</span>`;
        } catch {}
      }
    }
    conversationHistory.push({ role: 'assistant', content: fullText });
  } catch (err) {
    removeTyping();
    renderMessage('assistant', `⚠ Connection error: ${err.message}`);
  } finally {
    isStreaming = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }
}

async function checkHealth() {
  try {
    const r = await fetch(`${API_BASE}/health`, { signal: AbortSignal.timeout(3000) });
    const data = await r.json();
    const online = r.ok && data.ollama_available;
    document.getElementById('ollama-dot').className = 'status-dot' + (online ? '' : ' offline');
    document.getElementById('ollama-label').textContent = online ? 'Qwen3 8B ✓' : 'Ollama Offline';
    const opcOk = data.opc_connected;
    document.getElementById('opc-dot').className = 'status-dot' + (opcOk ? '' : ' offline');
    document.getElementById('opc-label').textContent = opcOk ? 'OPC Connected' : 'OPC Offline';
  } catch {
    document.getElementById('ollama-dot').className = 'status-dot offline';
    document.getElementById('ollama-label').textContent = 'API Offline';
  }
}

async function refreshOpcCache() {
  try {
    const r = await fetch(`${API_BASE}/api/opc/cache`);
    const data = await r.json();
    const cache = data.cache || {};
    const statMap = { 'RUNNING':'running','FAULT':'fault','IDLE':'idle','AUTO':'auto' };
    const setTag = (id, key) => {
      const el = document.getElementById(id); if (!el) return;
      const val = cache[key] ? String(cache[key].value ?? '—') : '—';
      el.textContent = val;
      el.className = 'opc-tag-value ' + (statMap[val] || '');
    };
    setTag('tag-l1-status','Line1.MachineStatus');
    setTag('tag-l2-status','Line2.MachineStatus');
    setTag('tag-l3-status','Line3.MachineStatus');
    setTag('tag-l4-status','Line4.MachineStatus');
    const l1actual = cache['Line1.ShiftActualCount'];
    const l1target = cache['Line1.ShiftTargetCount'];
    document.getElementById('tag-l1-good').textContent = l1actual ? Number(l1actual.value).toLocaleString() : '—';
    document.getElementById('tag-l1-target').textContent = l1target ? Number(l1target.value).toLocaleString() : '—';
    const statuses = ['Line1','Line2','Line3','Line4'].map(l => cache[`${l}.MachineStatus`]?.value);
    document.getElementById('kpi-running').textContent = statuses.filter(s=>s==='RUNNING').length;
    document.getElementById('kpi-idle').textContent = statuses.filter(s=>s==='IDLE').length;
    document.getElementById('kpi-fault').textContent = statuses.filter(s=>s==='FAULT').length;
    document.getElementById('kpi-tags').textContent = data.tag_count || 0;
  } catch {}
}

setInterval(checkHealth, 10000);
setInterval(refreshOpcCache, 5000);
checkHealth();
refreshOpcCache();
</script>
</body>
</html>
